<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#ff2442" />
  <meta name="format-detection" content="telephone=no" />
  <title>祥钰系统</title>
  <link rel="preload" href="/css/app.css" as="style" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-inner">
        <div class="brand-block">
          <span class="brand-mark">祥</span>
          <div class="brand-text">
            <div class="brand-title" id="shopName">祥钰系统</div>
            <div class="brand-sub">订单 · 拍照 · 发送</div>
          </div>
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="打开菜单">
            <span class="menu-icon"></span>
          </button>
        </div>
        <nav class="nav-wrap" id="navWrap">
          <div class="nav-pill-track" id="mainNav">
            <span class="nav-pill" id="navPill" aria-hidden="true"></span>
            <button type="button" class="nav-btn active" data-route="orders">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              订单
            </button>
            <button type="button" class="nav-btn" data-route="settings" id="settingsNavBtn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
              设置
            </button>
          </div>
        </nav>
      </div>
    </header>

    <main id="app" class="app-main"></main>

    <nav class="mobile-tab-bar" id="mobileTabBar" aria-label="主导航">
      <button type="button" class="mobile-tab active" data-route="orders">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>订单</span>
      </button>
      <button type="button" class="mobile-tab" data-route="settings" id="mobileSettingsTab">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <span>设置</span>
      </button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <dialog id="passwordDialog" class="dialog">
    <form method="dialog" id="passwordForm" class="dialog-body">
      <div class="dialog-accent"></div>
      <h3>进入设置</h3>
      <p class="muted">请输入管理密码</p>
      <input type="password" id="settingsPassword" placeholder="管理密码" autocomplete="current-password" required />
      <div class="dialog-error" id="passwordError" hidden></div>
      <div class="dialog-actions">
        <button type="button" class="btn ghost" id="passwordCancel">取消</button>
        <button type="submit" class="btn primary">确认</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
